name: Lint and Go / TypeScript checks
description: >-
  Composite action factoring out the OpenAPI lint, drift gate, and
  Go / TypeScript build / test steps so the CI workflow can run them
  on either the self-hosted arc-runners-naughtbot pool (push, same-repo
  PRs) or the GitHub-hosted ubuntu-latest pool (fork PRs).

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26.x'
        cache: true
        cache-dependency-path: go/go.sum

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24'
        cache: npm
        cache-dependency-path: typescript/package-lock.json

    - name: Lint OpenAPI sources
      shell: bash
      run: make openapi-lint

    - name: Install TypeScript deps
      shell: bash
      run: npm --prefix typescript ci

    - name: Verify Go / TypeScript / bundle drift
      # Skip the swift portion of generate-check on Linux — Swift drift
      # is gated by the macOS swift job. Directory-level scan catches
      # new untracked generator outputs; the grep filter excludes
      # hand-written test files that intentionally live alongside
      # generated sources.
      shell: bash
      run: |
        make bundle generate-go generate-typescript
        dirty=$(git status --porcelain -- \
          openapi/bundled \
          go \
          typescript/src \
          2>/dev/null \
          | grep -vE '(^.. )go/[^/]+_test\.go$|(^.. )typescript/src/[^/]+\.test\.ts$' \
          || true)
        if [ -n "$dirty" ]; then
          echo "Generator drift detected. Run 'make generate' and commit the result." >&2
          printf '%s\n' "$dirty"
          exit 1
        fi

    - name: Go test
      shell: bash
      run: make test-go

    - name: TypeScript build
      # tsc -p tsconfig.json is the real type-check gate. node --test
      # below runs with --experimental-strip-types which erases types
      # without checking them, so a binding regression that makes a
      # field optional or wrong-typed would still pass the runtime
      # tests; this step is the compile-time backstop.
      shell: bash
      run: make build-typescript

    - name: TypeScript typecheck smoke tests
      # The default tsconfig excludes src/**/*.test.ts so the published
      # package only ships type definitions for the runtime surface.
      # `typecheck:tests` re-includes the smoke tests so a regression
      # that weakens the contract (e.g. making `algorithm` optional in
      # the GPG decrypt success branch) fails CI before the runtime
      # tests, which run under --experimental-strip-types and erase
      # types without checking them.
      shell: bash
      run: npm --prefix typescript run typecheck:tests

    - name: TypeScript test
      shell: bash
      run: make test-typescript
