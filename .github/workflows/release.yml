name: release

# Tag-driven release. Pushing a `v<MAJOR>.<MINOR>.<PATCH>` tag at a
# clean main commit runs:
#
#   1. Drift gate: regenerate every binding and assert git diff is
#      empty. Prevents publishing a release whose committed bindings
#      do not match the openapi/ sources at the tag.
#   2. Per-language subdirectory tags: `go/<ver>`, `swift/<ver>`,
#      `typescript/<ver>` — created on the same commit as the
#      top-level `v<ver>` tag. The Go module resolver consumes the
#      `go/<ver>` tag for the `/go/` subdir layout.
#   3. GitHub release: opened against the top-level `v<ver>` tag with
#      auto-generated notes.
#   4. npm publish: `@naughtbot/e2ee-payloads@<ver>` via Trusted
#      Publishing (OIDC) — matches the NaughtBot/api pattern.
#
# Releases are tag-driven only. Do not run any of the steps below
# manually; pushing the tag is the entire release surface.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  verify:
    runs-on: arc-runners-naughtbot
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          if [ "$version" = "$REF_NAME" ] || [ -z "$version" ]; then
            echo "release: expected tag vX.Y.Z, got '$REF_NAME'" >&2
            exit 2
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Reject release tags that do not point at a commit reachable from
      # main. Without this, anyone with push access could fork a branch
      # off an old commit and tag a release from there, bypassing the
      # PR + main-branch review process.
      - name: Verify tag commit is reachable from origin/main
        run: |
          set -euo pipefail
          tag_commit=$(git rev-parse HEAD)
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "release: tag commit $tag_commit is not reachable from origin/main." >&2
            echo "Releases MUST be tagged on a main commit." >&2
            exit 2
          fi

      # Verify typescript/package.json version matches the tag BEFORE
      # any tags or GitHub release are created. Catching a missing
      # version bump here means we never end up with a half-published
      # release (subdir tags + GH release present, npm missing /
      # mismatched) that requires manual cleanup.
      - name: Verify typescript/package.json version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          pkg_version=$(node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("typescript/package.json","utf8")); process.stdout.write(pkg.version);')
          if [ "$pkg_version" != "$VERSION" ]; then
            echo "release: typescript/package.json version ($pkg_version) does not match tag ($VERSION)." >&2
            echo "Bump the version in a commit on main before pushing v${VERSION}." >&2
            exit 2
          fi

      - uses: ./.github/actions/lint-and-go-typescript

  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Swift drift at the tag commit
        run: |
          make generate-swift
          dirty=$(git status --porcelain -- swift/Sources/NaughtBotE2EEPayloads 2>/dev/null)
          if [ -n "$dirty" ]; then
            echo "release: swift generator drift at the tag commit" >&2
            printf '%s\n' "$dirty"
            exit 1
          fi

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test

  tag-and-release:
    needs: [verify, swift]
    runs-on: arc-runners-naughtbot
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # `git tag -a` requires user identity; arc-runners do not ship a
      # global identity, so set a workflow-scoped one explicitly.
      - name: Configure git identity for tagging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push per-language subdir tags
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          tag_commit=$(git rev-parse HEAD)
          for lang in go swift typescript; do
            tag="${lang}/v${VERSION}"
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              existing=$(git rev-list -n1 "refs/tags/${tag}")
              if [ "$existing" = "$tag_commit" ]; then
                echo "tag ${tag} already exists at the same commit ($tag_commit); reusing."
                continue
              fi
              echo "release: tag ${tag} already exists at $existing but the release commit is $tag_commit. Refusing to clobber." >&2
              exit 2
            fi
            git tag -a "${tag}" -m "${lang} v${VERSION}"
            git push origin "${tag}"
          done

      # Idempotent: if a previous run already opened the release (e.g.
      # an earlier failed npm publish), reuse it.
      - name: Create or reuse GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "release v${VERSION} already exists; reusing."
            exit 0
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes

  npm-publish:
    needs: [verify, tag-and-release]
    if: ${{ vars.NPM_TRUSTED_PUBLISHING_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install TypeScript deps
        run: npm --prefix typescript ci

      - name: Build TypeScript package
        run: npm --prefix typescript run build

      - name: Publish @naughtbot/e2ee-payloads
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        working-directory: typescript
        run: |
          set -euo pipefail
          # The verify job already enforced that package.json `version`
          # matches the tag; the same check here is a belt-and-braces
          # guard against package.json being mutated between jobs.
          metadata=$(node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("package.json","utf8")); process.stdout.write(`${pkg.name}\t${pkg.version}`);')
          IFS=$'\t' read -r package_name package_version <<< "$metadata"
          if [ "$package_version" != "$VERSION" ]; then
            echo "release: package.json version ($package_version) does not match tag ($VERSION)." >&2
            exit 2
          fi
          if published_version=$(npm view "${package_name}@${package_version}" version 2>/dev/null) \
              && [ "$published_version" = "$package_version" ]; then
            echo "${package_name}@${package_version} already exists on npm; skipping."
            exit 0
          fi
          npm publish --access public
