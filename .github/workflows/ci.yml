name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # OpenAPI lint + Go / TypeScript drift / test on Linux. Swift drift +
  # test runs on macOS below where the toolchain is pre-installed.
  lint-and-go-typescript:
    # arc-runners-naughtbot is the org-wide self-hosted Linux runner pool
    # used by NaughtBot/{core, api}. Gate fork PRs out of the
    # self-hosted pool to avoid giving untrusted contributors code
    # execution on organization infrastructure: a fork PR opens, CI
    # checks out the PR head ref, and `make` runs that ref's commands
    # against the runner's filesystem and network. Push-to-main and
    # same-repo PRs (lane branches, NaughtBot members) keep the
    # self-hosted job; fork PRs are still validated by the macOS Swift
    # job below since GitHub-hosted macOS runners do not have this
    # exposure.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: arc-runners-naughtbot
    steps:
      # Org policy requires every action be pinned to a full-length SHA;
      # the trailing comment carries the human-readable tag for review.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: go/go.sum

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Lint OpenAPI sources
        run: make openapi-lint

      - name: Install TypeScript deps
        run: npm --prefix typescript ci

      - name: Verify Go / TypeScript / bundle drift
        # Skip the swift portion of generate-check on Linux — Swift drift
        # is gated by the macOS swift job below. Directory-level scan
        # catches new untracked generator outputs; the grep filter
        # excludes hand-written test files that intentionally live
        # alongside generated sources.
        run: |
          make bundle generate-go generate-typescript
          dirty=$(git status --porcelain -- \
            openapi/bundled \
            go \
            typescript/src \
            2>/dev/null \
            | grep -vE '(^.. )go/[^/]+_test\.go$|(^.. )typescript/src/[^/]+\.test\.ts$|(^.. )go/go\.(mod|sum)$' \
            || true)
          if [ -n "$dirty" ]; then
            echo "Generator drift detected. Run 'make generate' and commit the result." >&2
            printf '%s\n' "$dirty"
            exit 1
          fi

      - name: Go test
        run: make test-go

      - name: TypeScript build
        # tsc -p tsconfig.json is the real type-check gate. node --test
        # below runs with --experimental-strip-types which erases types
        # without checking them, so a binding regression that makes a
        # field optional or wrong-typed would still pass the runtime
        # tests; this step is the compile-time backstop.
        run: make build-typescript

      - name: TypeScript typecheck smoke tests
        # The default tsconfig excludes src/**/*.test.ts so the published
        # package only ships type definitions for the runtime surface.
        # `typecheck:tests` re-includes the smoke tests so a regression
        # that weakens the contract (e.g. making `algorithm` optional in
        # the GPG decrypt success branch) fails CI before the runtime
        # tests, which run under --experimental-strip-types and erase
        # types without checking them.
        run: npm --prefix typescript run typecheck:tests

      - name: TypeScript test
        run: make test-typescript

  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Swift drift
        # The swift-openapi-generator binary is cached under
        # .swift-openapi-generator/. The first invocation clones and
        # builds it; subsequent runs reuse the same binary. Scan the
        # whole generated directory so a new untracked generator output
        # also fails the gate.
        run: |
          make generate-swift
          dirty=$(git status --porcelain -- swift/Sources/NaughtBotE2EEPayloads 2>/dev/null)
          if [ -n "$dirty" ]; then
            echo "Swift generator drift detected. Run 'make generate-swift' and commit the result." >&2
            printf '%s\n' "$dirty"
            exit 1
          fi

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test
