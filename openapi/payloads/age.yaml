openapi: 3.0.3
info:
  title: NaughtBot mailbox age payloads
  description: >-
    Request/response payload schemas for the `age_unwrap` mailbox envelope
    type. The producer encodes a `MailboxAgeUnwrapRequestPayloadV1` as the
    envelope `payload`; the approver returns the matching response payload
    inside the encrypted response envelope.
  version: 0.1.0
  license:
    name: MIT
paths: {}
components:
  schemas:
    MailboxAgeUnwrapRequestPayloadV1:
      title: MailboxAgeUnwrapRequestPayloadV1
      description: >-
        Request payload for the `age_unwrap` envelope type. The approver
        unwraps an age `X25519` recipient stanza using the on-device X25519
        key matching `recipient_public_hex`.
      type: object
      additionalProperties: false
      required: [ephemeral_public_hex, wrapped_file_key, recipient_public_hex]
      properties:
        ephemeral_public_hex:
          type: string
          description: >-
            Lowercase hex-encoded sender's ephemeral X25519 public key
            (64 hex chars for the 32-byte key).
          pattern: '^[0-9a-f]{64}$'
          example: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
        wrapped_file_key:
          type: string
          format: byte
          description: >-
            RFC 4648 standard base64 with `=` padding for the wrapped file
            key for decryption.
          example: d3JhcHBlZCBmaWxlIGtleQ==
        recipient_public_hex:
          type: string
          description: >-
            Lowercase hex-encoded recipient's X25519 public key (64 hex chars
            for the 32-byte key).
          pattern: '^[0-9a-f]{64}$'
          example: "b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3"
        approval_challenge:
          $ref: 'common.yaml#/components/schemas/ApprovalChallenge'
        display:
          $ref: 'common.yaml#/components/schemas/DisplaySchema'
        source_info:
          $ref: 'common.yaml#/components/schemas/SourceInfo'

    MailboxAgeUnwrapResponsePayloadV1:
      title: MailboxAgeUnwrapResponsePayloadV1
      description: >-
        Response payload for the `age_unwrap` envelope type. Discriminated
        as a success / failure pair.
      oneOf:
        - $ref: '#/components/schemas/MailboxAgeUnwrapResponseSuccessV1'
        - $ref: '#/components/schemas/MailboxAgeUnwrapResponseFailureV1'

    MailboxAgeUnwrapResponseSuccessV1:
      title: MailboxAgeUnwrapResponseSuccessV1
      description: Success branch of `MailboxAgeUnwrapResponsePayloadV1`.
      type: object
      additionalProperties: false
      required: [file_key]
      properties:
        file_key:
          type: string
          format: byte
          description: >-
            RFC 4648 standard base64 with `=` padding for the unwrapped age
            file key.
          example: ZmlsZSBrZXk=
        approval_proof:
          $ref: 'common.yaml#/components/schemas/ApprovalAttestedKeyProof'

    MailboxAgeUnwrapResponseFailureV1:
      title: MailboxAgeUnwrapResponseFailureV1
      description: Failure branch of `MailboxAgeUnwrapResponsePayloadV1`.
      type: object
      additionalProperties: false
      required: [error_code]
      properties:
        error_code:
          $ref: 'common.yaml#/components/schemas/SigningErrorCode'
        error_message:
          type: string
          description: Human-readable error message.
          example: User rejected the request
