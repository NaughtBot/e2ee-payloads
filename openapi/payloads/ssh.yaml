openapi: 3.0.3
info:
  title: NaughtBot mailbox SSH payloads
  description: >-
    Request/response payload schemas for the `ssh_auth` and `ssh_sign`
    mailbox envelope types. The producer encodes a `MailboxSshAuthRequestPayloadV1`
    or `MailboxSshSignRequestPayloadV1` as the envelope `payload` and ships it
    via HPKE plaintext. The approver returns the matching response payload
    inside the encrypted response envelope.
  version: 0.2.0
  license:
    name: MIT
paths: {}
components:
  schemas:
    # ---- ssh_auth ---------------------------------------------------------

    MailboxSshAuthRequestPayloadV1:
      title: MailboxSshAuthRequestPayloadV1
      description: >-
        Request payload for the `ssh_auth` envelope type. The approver signs
        an SSH user-authentication challenge constructed from `raw_data`,
        using the on-device key selected by `device_key_id`.
      type: object
      additionalProperties: false
      required: [raw_data, device_key_id]
      properties:
        raw_data:
          type: string
          format: byte
          description: >-
            RFC 4648 standard base64 with `=` padding for the raw SSH
            challenge preimage. The approver builds the canonical SSH
            signature input from this preimage.
          example: c3NoIGNoYWxsZW5nZQ==
        key_id:
          type: string
          description: Identifier of the key to sign with.
          example: key_abc123
        application:
          type: string
          description: SSH application identifier (e.g. `ssh:`).
          example: "ssh:"
        flags:
          type: integer
          format: int32
          minimum: 0
          maximum: 255
          description: >-
            SSH SK flags bitmask. Default `0x01` requires user presence.
          default: 1
          example: 1
        device_key_id:
          type: string
          description: >-
            Device-side key identifier (e.g. iOS Secure Enclave handle) used
            to select among enrolled signing keys on the approver.
        approval_challenge:
          $ref: 'common.yaml#/components/schemas/ApprovalChallenge'
        display:
          $ref: 'common.yaml#/components/schemas/DisplaySchema'
        source_info:
          $ref: 'common.yaml#/components/schemas/SourceInfo'

    MailboxSshAuthResponsePayloadV1:
      title: MailboxSshAuthResponsePayloadV1
      description: >-
        Response payload for the `ssh_auth` envelope type. Discriminated as
        a success / failure pair. Decoders pick `MailboxSshAuthResponseSuccessV1`
        if `signature` is present and `MailboxSshAuthResponseFailureV1` if
        `error_code` is present.
      oneOf:
        - $ref: '#/components/schemas/MailboxSshAuthResponseSuccessV1'
        - $ref: '#/components/schemas/MailboxSshAuthResponseFailureV1'

    MailboxSshAuthResponseSuccessV1:
      title: MailboxSshAuthResponseSuccessV1
      description: >-
        Success branch of `MailboxSshAuthResponsePayloadV1`. Carries the raw
        SSH signature plus the per-signature SK assertion flags byte and
        monotonic counter the signer's secure element returned for this
        signing operation; all three are required so the requester can
        rebuild the OpenSSH SK signature preimage
        (`SHA256(application) || flags || counter || SHA256(data)`) and
        verify against the enrolled credential public key.
      type: object
      additionalProperties: false
      required: [signature, flags, counter]
      properties:
        signature:
          type: string
          format: byte
          description: >-
            RFC 4648 standard base64 with `=` padding for the raw SSH
            signature blob (no SSH-wire framing).
        flags:
          type: integer
          minimum: 0
          maximum: 255
          description: >-
            Per-signature SK assertion flags byte the signer's secure
            element actually asserted with. Approvers MUST either (a)
            assert with at least the bits the request `flags` byte asked
            for (UP=0x01, UV=0x04) and return the resulting byte here, or
            (b) return a `MailboxSshAuthResponseFailureV1` /
            `MailboxSshSignResponseFailureV1` with the appropriate signing
            error code. Approvers MUST NOT return a success response whose
            asserted flags byte clears bits the requester set; that would
            silently downgrade the security posture (e.g. UV-required →
            UP-only) below what the request agreed to. Receivers MUST
            embed this asserted byte at the `flags` position of the OpenSSH
            SK signature preimage; verification fails if the request
            `flags` byte is used instead. Receivers SHOULD additionally
            verify that every bit set in the request `flags` byte is also
            set here as belt-and-suspenders defence against a misbehaving
            approver.
          example: 1
        counter:
          type: integer
          format: int64
          minimum: 0
          maximum: 4294967295
          description: >-
            Monotonic counter (u32) the signer's secure element returned for
            this SK signing operation. Receivers MUST embed this in the
            OpenSSH SK signature preimage at the position between `flags`
            and `SHA256(data)` as a 4-byte big-endian unsigned integer.
            Successive signatures from the same key handle MUST have
            strictly increasing counter values. The schema declares
            `format: int64` so 32-bit Go targets can still represent the
            full u32 range without overflow.
          example: 1
        approval_proof:
          $ref: 'common.yaml#/components/schemas/ApprovalAttestedKeyProof'

    MailboxSshAuthResponseFailureV1:
      title: MailboxSshAuthResponseFailureV1
      description: Failure branch of `MailboxSshAuthResponsePayloadV1`.
      type: object
      additionalProperties: false
      required: [error_code]
      properties:
        error_code:
          $ref: 'common.yaml#/components/schemas/SigningErrorCode'
        error_message:
          type: string
          description: Human-readable error message.
          example: User rejected the request

    # ---- ssh_sign ---------------------------------------------------------

    MailboxSshSignRequestPayloadV1:
      title: MailboxSshSignRequestPayloadV1
      description: >-
        Request payload for the `ssh_sign` envelope type. The approver signs
        an SSH signature input derived from `raw_data` (e.g. `git commit -S`
        SSH signing), using the on-device key selected by `device_key_id`.
      type: object
      additionalProperties: false
      required: [raw_data, device_key_id]
      properties:
        raw_data:
          type: string
          format: byte
          description: >-
            RFC 4648 standard base64 with `=` padding for the raw data to
            sign (preimage). The approver builds the canonical SSH signature
            input from this preimage.
          example: ZGF0YSB0byBzaWdu
        key_id:
          type: string
          description: Identifier of the key to sign with.
          example: key_abc123
        application:
          type: string
          description: SSH application identifier (e.g. `ssh:`).
          example: "ssh:"
        flags:
          type: integer
          format: int32
          minimum: 0
          maximum: 255
          description: >-
            SSH SK flags bitmask. Default `0x01` requires user presence.
          default: 1
          example: 1
        device_key_id:
          type: string
          description: >-
            Device-side key identifier (e.g. iOS Secure Enclave handle) used
            to select among enrolled signing keys on the approver.
        approval_challenge:
          $ref: 'common.yaml#/components/schemas/ApprovalChallenge'
        display:
          $ref: 'common.yaml#/components/schemas/DisplaySchema'
        source_info:
          $ref: 'common.yaml#/components/schemas/SourceInfo'

    MailboxSshSignResponsePayloadV1:
      title: MailboxSshSignResponsePayloadV1
      description: >-
        Response payload for the `ssh_sign` envelope type. Discriminated as
        a success / failure pair.
      oneOf:
        - $ref: '#/components/schemas/MailboxSshSignResponseSuccessV1'
        - $ref: '#/components/schemas/MailboxSshSignResponseFailureV1'

    MailboxSshSignResponseSuccessV1:
      title: MailboxSshSignResponseSuccessV1
      description: >-
        Success branch of `MailboxSshSignResponsePayloadV1`. Carries the raw
        SSH signature plus the per-signature SK assertion flags byte and
        monotonic counter the signer's secure element returned for this
        signing operation; all three are required so the requester can
        rebuild the OpenSSH SK signature preimage
        (`SHA256(application) || flags || counter || SHA256(data)`) and
        verify against the enrolled credential public key.
      type: object
      additionalProperties: false
      required: [signature, flags, counter]
      properties:
        signature:
          type: string
          format: byte
          description: >-
            RFC 4648 standard base64 with `=` padding for the raw SSH
            signature blob (no SSH-wire framing).
        flags:
          type: integer
          minimum: 0
          maximum: 255
          description: >-
            Per-signature SK assertion flags byte the signer's secure
            element actually asserted with. Approvers MUST either (a)
            assert with at least the bits the request `flags` byte asked
            for (UP=0x01, UV=0x04) and return the resulting byte here, or
            (b) return a `MailboxSshAuthResponseFailureV1` /
            `MailboxSshSignResponseFailureV1` with the appropriate signing
            error code. Approvers MUST NOT return a success response whose
            asserted flags byte clears bits the requester set; that would
            silently downgrade the security posture (e.g. UV-required →
            UP-only) below what the request agreed to. Receivers MUST
            embed this asserted byte at the `flags` position of the OpenSSH
            SK signature preimage; verification fails if the request
            `flags` byte is used instead. Receivers SHOULD additionally
            verify that every bit set in the request `flags` byte is also
            set here as belt-and-suspenders defence against a misbehaving
            approver.
          example: 1
        counter:
          type: integer
          format: int64
          minimum: 0
          maximum: 4294967295
          description: >-
            Monotonic counter (u32) the signer's secure element returned for
            this SK signing operation. Receivers MUST embed this in the
            OpenSSH SK signature preimage at the position between `flags`
            and `SHA256(data)` as a 4-byte big-endian unsigned integer.
            Successive signatures from the same key handle MUST have
            strictly increasing counter values. The schema declares
            `format: int64` so 32-bit Go targets can still represent the
            full u32 range without overflow.
          example: 1
        approval_proof:
          $ref: 'common.yaml#/components/schemas/ApprovalAttestedKeyProof'

    MailboxSshSignResponseFailureV1:
      title: MailboxSshSignResponseFailureV1
      description: Failure branch of `MailboxSshSignResponsePayloadV1`.
      type: object
      additionalProperties: false
      required: [error_code]
      properties:
        error_code:
          $ref: 'common.yaml#/components/schemas/SigningErrorCode'
        error_message:
          type: string
          description: Human-readable error message.
          example: User rejected the request
