openapi: 3.0.3
info:
  title: NaughtBot e2ee mailbox payloads (bundle root)
  description: >-
    Aggregator entry point that re-exports every component schema authored
    under `openapi/`. The Makefile's `make bundle` target feeds this file to
    Redocly to produce `openapi/bundled/payloads.yaml`, a single
    self-contained document that the Go / Swift / TypeScript generators
    consume. Hand-edited only when adding a new payload surface — bump the
    `components.schemas` table to re-export the new schemas.
  version: 0.3.0
  license:
    name: MIT
paths: {}
